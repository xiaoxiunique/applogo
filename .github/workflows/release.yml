name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/launch staging/
          cp README.md LICENSE staging/
          cd staging
          tar czf ../launch-${{ matrix.target }}.tar.gz *
        shell: bash

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir staging
          copy target\${{ matrix.target }}\release\launch.exe staging\
          copy README.md staging\
          copy LICENSE staging\
          cd staging
          7z a ..\launch-${{ matrix.target }}.zip *
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: launch-${{ matrix.target }}
          path: launch-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            launch-*.tar.gz
            launch-*.zip
